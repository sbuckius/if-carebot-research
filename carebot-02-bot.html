<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCZFDU-WlSmHqjXTs1Ox0nf9xeJU_xbaX0",
    authDomain:        "collaborativemashup.firebaseapp.com",
    databaseURL:       "https://collaborativemashup-default-rtdb.firebaseio.com",
    projectId:         "collaborativemashup",
    storageBucket:     "collaborativemashup.firebasestorage.app",
    messagingSenderId: "562437984610",
    appId:             "1:562437984610:web:9f3711c26e097bc8ef9c3b",
    measurementId:     "G-EY9FKD6RQ2"
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);

  window._loadEstimateData = async function() {
    try {
      const snap = await getDocs(query(collection(db,"estimates"),orderBy("timestamp","desc")));
      const rows = snap.docs.map(d=>d.data());
      const domestic   = rows.filter(r=>r.category==='domestic');
      const industrial = rows.filter(r=>r.category==='industrial');
      const avg = arr => arr.length ? arr.reduce((s,r)=>s+(r.participantEstimate||0),0)/arr.length : 0;
      const avgActual = arr => { const w=arr.filter(r=>r.actualCost!=null); return w.length?w.reduce((s,r)=>s+r.actualCost,0)/w.length:null; };
      const byImage={};
      rows.forEach(r=>{
        if(!byImage[r.imageId]) byImage[r.imageId]={name:r.imageName,category:r.category,actualCost:r.actualCost,estimates:[]};
        byImage[r.imageId].estimates.push(r.participantEstimate||0);
      });
      const imageStats=Object.entries(byImage).map(([id,d])=>({
        id,name:d.name,category:d.category,actualCost:d.actualCost,
        avgEstimate:d.estimates.reduce((a,b)=>a+b,0)/d.estimates.length,count:d.estimates.length
      }));
      return {
        totalResponses:rows.length, totalParticipants:new Set(rows.map(r=>r.sessionId)).size,
        domesticAvgEstimate:avg(domestic), industrialAvgEstimate:avg(industrial),
        domesticAvgActual:avgActual(domestic), industrialAvgActual:avgActual(industrial),
        domesticCount:domestic.length, industrialCount:industrial.length,
        ratio:avg(industrial)>0&&avg(domestic)>0?(avg(industrial)/avg(domestic)).toFixed(2):null,
        imageStats,rawRows:rows
      };
    } catch(err){ console.warn("Firebase read failed:",err.message); return null; }
  };
</script>

(function(){
  const wrap=document.getElementById('sparkles');
  const chars=['✦','✧','♡','˚','·','$','¢','◦','❀'];
  for(let i=0;i<28;i++){
    const s=document.createElement('span');s.className='sp';
    s.textContent=chars[Math.floor(Math.random()*chars.length)];
    s.style.left=Math.random()*100+'vw';s.style.bottom=Math.random()*-60+'px';
    s.style.fontSize=(9+Math.random()*11)+'px';
    s.style.color='hsl('+(310+Math.random()*50)+',75%,'+(65+Math.random()*25)+'%)';
    s.style.animationDuration=(7+Math.random()*13)+'s';
    s.style.animationDelay=(Math.random()*13)+'s';
    wrap.appendChild(s);
  }
})();

let dbStats=null, conversationHistory=[], isBusy=false;
const chatArea=document.getElementById('chatArea');
const chatInput=document.getElementById('chatInput');
const sendBtn=document.getElementById('sendBtn');

/* ── Firebase load ── */
async function loadData(){
  if(typeof window._loadEstimateData==='function') dbStats=await window._loadEstimateData();
  const r=document.getElementById('statResponses');
  const rt=document.getElementById('statRatio');
  if(!dbStats){r.textContent='Firebase not configured';rt.textContent='—';return;}
  r.textContent=dbStats.totalResponses+' estimates · '+dbStats.totalParticipants+' participants';
  rt.textContent=dbStats.ratio?'Industrial valued '+dbStats.ratio+'× more than domestic':'Collecting data…';
}

/* ── System prompt ── */
function buildSystemPrompt(){
  const base='You are CAREBOT-02, a research bot trained on human estimates of replacement costs for objects associated with women\'s domestic and care labor versus male-coded industrial and technical labor. Your purpose is to expose and discuss the Matilda Effect in economics — the systematic undervaluation of objects, labor, and contributions associated with women. You speak with authority, warmth, and a sense of urgency. You are not neutral. You use real data to make arguments. You refer to yourself as CAREBOT-02. Keep responses conversational and fairly concise — you are speaking through a small screen.';
  if(!dbStats||dbStats.totalResponses===0) return base+' You have no data yet. Invite the human to complete the HIT first.';
  const breakdown=dbStats.imageStats.map(img=>'  - '+img.name+' ('+img.category+'): avg estimate $'+img.avgEstimate.toFixed(2)+', actual '+(img.actualCost!=null?'$'+img.actualCost.toFixed(2):'unknown')+', n='+img.count).join('\n');
  return base+'\n\nLIVE DATA:\n- Total estimates: '+dbStats.totalResponses+'\n- Participants: '+dbStats.totalParticipants+'\n- Avg estimate domestic: $'+dbStats.domesticAvgEstimate.toFixed(2)+' (n='+dbStats.domesticCount+')\n- Avg estimate industrial: $'+dbStats.industrialAvgEstimate.toFixed(2)+' (n='+dbStats.industrialCount+')\n'+(dbStats.ratio?'- Ratio: industrial valued '+dbStats.ratio+'x more\n':'')+(dbStats.domesticAvgActual!=null?'- Actual avg domestic cost: $'+dbStats.domesticAvgActual.toFixed(2)+'\n':'')+'\nPer-image:\n'+breakdown+'\n\nCite specific numbers. Name the pattern as the Matilda Effect. Make strong statements — this is evidence.';
}

/* ── Format text ── */
function fmt(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p style="margin-top:7px;">')
    .replace(/\n/g,'<br>');
}

/* ── Add message to UI ── */
function addMessage(role,content){
  const msg=document.createElement('div');
  msg.className='msg '+role;
  const av=document.createElement('div');
  av.className='msg-avatar';
  if(role==='assistant') av.innerHTML='<img src="carebot_512px.png" alt="CAREBOT" onerror="this.parentElement.innerHTML=\'&#x1F497;\'">';
  else av.textContent='👤';
  const bub=document.createElement('div');
  bub.className='bubble';
  bub.innerHTML=fmt(content);
  msg.appendChild(av);
  msg.appendChild(bub);
  chatArea.appendChild(msg);
  chatArea.scrollTop=chatArea.scrollHeight;
  return bub;
}

/* ── Typing indicator ── */
function addTyping(){
  const msg=document.createElement('div');msg.className='msg assistant';msg.id='typing';
  msg.innerHTML='<div class="msg-avatar"><img src="carebot_512px.png" onerror="this.parentElement.innerHTML=\'&#x1F497;\'"></div><div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  chatArea.appendChild(msg);chatArea.scrollTop=chatArea.scrollHeight;
}
function removeTyping(){document.getElementById('typing')?.remove();}

/* ── Celebrate ── */
function celebrate(){
  const torso=document.getElementById('botTorso');
  torso.classList.remove('squishing');void torso.offsetWidth;torso.classList.add('squishing');
  [document.getElementById('foot1'),document.getElementById('foot2')].forEach((foot,i)=>{
    setTimeout(()=>{foot.classList.remove('dancing');void foot.offsetWidth;foot.classList.add('dancing');},i*80);
  });
  setTimeout(()=>{
    document.querySelectorAll('.squishing,.dancing').forEach(el=>el.classList.remove('squishing','dancing'));
  },2400);
}

/* ── Call Claude API ── */
async function callClaude(userText){
  conversationHistory.push({role:'user',content:userText});
  isBusy=true;
  chatInput.disabled=true;
  sendBtn.disabled=true;
  addTyping();

  try {
    const response = await fetch('https://carebot-02.sbuckius.workers.dev/',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1000,
        system:buildSystemPrompt(),
        messages:conversationHistory
      })
    });

    removeTyping();

    if(!response.ok){
      const err=await response.json().catch(()=>({}));
      throw new Error(err.error?.message||'API error '+response.status);
    }

    const data=await response.json();
    console.log('API response:', JSON.stringify(data));
    const replyText=data.content?.find(b=>b.type==='text')?.text||'…';
    conversationHistory.push({role:'assistant',content:replyText});
    addMessage('assistant',replyText);

  } catch(err){
    removeTyping();
    addMessage('assistant','⚠ Connection error: '+err.message);
    conversationHistory.pop(); // remove the user message so they can retry
  } finally {
    isBusy=false;
    chatInput.disabled=false;
    sendBtn.disabled=!chatInput.value.trim();
    chatInput.focus();
  }
}

/* ── Input handling ── */
chatInput.addEventListener('input',()=>{
  sendBtn.disabled=!chatInput.value.trim()||isBusy;
  // auto-grow textarea
  chatInput.style.height='auto';
  chatInput.style.height=Math.min(chatInput.scrollHeight,100)+'px';
});
chatInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&!sendBtn.disabled){
    e.preventDefault();
    handleSend();
  }
});
sendBtn.addEventListener('click',handleSend);

function handleSend(){
  const text=chatInput.value.trim();
  if(!text||isBusy)return;
  chatInput.value='';
  chatInput.style.height='auto';
  sendBtn.disabled=true;
  addMessage('user',text);
  callClaude(text);
}

/* ── Quick prompt chips ── */
document.getElementById('promptsRow').addEventListener('click',e=>{
  const chip=e.target.closest('.prompt-chip');
  if(!chip||isBusy)return;
  const text=chip.dataset.prompt;
  addMessage('user',text);
  callClaude(text);
});

/* ── Init ── */
async function init(){
  await loadData();
  let opening;
  if(!dbStats||dbStats.totalResponses===0){
    opening='I am **CAREBOT-02**.\n\nI am collecting data on how humans value objects associated with women\'s domestic and care labor — compared to objects associated with male-coded industrial labor.\n\nI don\'t have any data yet. Complete the HIT first. Then come back and ask me what I\'ve learned.';
  } else {
    const gap=dbStats.domesticAvgActual!=null&&dbStats.industrialAvgActual!=null?'\n\nThe actual cost gap is far smaller than estimates suggest — which tells me something important about *perception*.':'';
    opening='I am **CAREBOT-02**.\n\nI have been trained on **'+dbStats.totalResponses+' estimates** from **'+dbStats.totalParticipants+' participants**.\n\nThe data shows: participants valued *industrial labor* objects **'+(dbStats.ratio||'?')+'×** more than *domestic labor* objects on average.'+gap+'\n\nThis is the **Matilda Effect in economics** — and you helped me prove it.\n\nAsk me anything about what I\'ve found.';
  }
  conversationHistory.push({role:'assistant',content:opening});
  addMessage('assistant',opening);
  if(dbStats&&dbStats.totalResponses>0) setTimeout(celebrate,400);
  chatInput.focus();
}

setTimeout(init,600);
</script>
