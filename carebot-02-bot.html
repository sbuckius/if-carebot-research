<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {

  apiKey: "AIzaSyCZFDU-WlSmHqjXTs1Ox0nf9xeJU_xbaX0",

  authDomain: "collaborativemashup.firebaseapp.com",

  databaseURL: "https://collaborativemashup-default-rtdb.firebaseio.com",

  projectId: "collaborativemashup",

  storageBucket: "collaborativemashup.firebasestorage.app",

  messagingSenderId: "562437984610",

  appId: "1:562437984610:web:9f3711c26e097bc8ef9c3b",

  measurementId: "G-EY9FKD6RQ2"

};
  // ────────────────────────────────────────────

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);

  // Load all estimates and compute aggregate stats
  window._loadEstimateData = async function() {
    try {
      const snap = await getDocs(
        query(collection(db, "estimates"), orderBy("timestamp", "desc"))
      );
      const rows = snap.docs.map(d => d.data());

      // Aggregate by category
      const domestic   = rows.filter(r => r.category === 'domestic');
      const industrial = rows.filter(r => r.category === 'industrial');

      const avg = arr => arr.length
        ? arr.reduce((s,r) => s + (r.participantEstimate||0), 0) / arr.length
        : 0;
      const avgActual = arr => {
        const withActual = arr.filter(r => r.actualCost != null);
        return withActual.length
          ? withActual.reduce((s,r) => s + r.actualCost, 0) / withActual.length
          : null;
      };

      // Per-image breakdown
      const byImage = {};
      rows.forEach(r => {
        if(!byImage[r.imageId]) byImage[r.imageId] = {
          name: r.imageName, category: r.category,
          actualCost: r.actualCost, estimates: []
        };
        byImage[r.imageId].estimates.push(r.participantEstimate||0);
      });
      const imageStats = Object.entries(byImage).map(([id,d]) => ({
        id, name: d.name, category: d.category, actualCost: d.actualCost,
        avgEstimate: d.estimates.reduce((a,b)=>a+b,0)/d.estimates.length,
        count: d.estimates.length
      }));

      return {
        totalResponses:     rows.length,
        totalParticipants:  new Set(rows.map(r=>r.sessionId)).size,
        domesticAvgEstimate:   avg(domestic),
        industrialAvgEstimate: avg(industrial),
        domesticAvgActual:     avgActual(domestic),
        industrialAvgActual:   avgActual(industrial),
        domesticCount:    domestic.length,
        industrialCount:  industrial.length,
        ratio: avg(industrial) > 0 && avg(domestic) > 0
          ? (avg(industrial) / avg(domestic)).toFixed(2) : null,
        imageStats,
        rawRows: rows
      };
    } catch(err) {
      console.warn("Firebase read failed:", err.message);
      return null;
    }
  };
</script>

<div class="bg-layer"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="sparkles" id="sparkles"></div>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="mascot">
      <div class="bot-face">
        <img src="carebot_512px.png" alt="CAREBOT" onerror="this.parentElement.innerHTML='💗'">
      </div>
      <div>
        <div class="bot-name">CAREBOT-02 ✦</div>
        <div class="bot-sub">Matilda Effect · Economics · Evidence</div>
      </div>
    </div>
    <div class="stats-row" id="statsRow">
      <div class="stat-pill"><div class="pip"></div><span id="statResponses">Loading…</span></div>
      <div class="stat-pill"><span id="statRatio">—</span></div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea"></div>

  <!-- INPUT -->
  <div class="input-bar">
    <textarea class="chat-input" id="chatInput" rows="1"
      placeholder="Ask CAREBOT-02 about the data…"></textarea>
    <button class="send-btn" id="sendBtn" disabled title="Send">✦</button>
  </div>

</div>

<script>
/* ── Sparkles ── */
(function(){
  const wrap=document.getElementById('sparkles');
  const chars=['✦','✧','♡','˚','·','$','¢','◦'];
  for(let i=0;i<28;i++){
    const s=document.createElement('span');s.className='sp';
    s.textContent=chars[Math.floor(Math.random()*chars.length)];
    s.style.left=Math.random()*100+'vw';
    s.style.bottom=Math.random()*-60+'px';
    s.style.fontSize=(9+Math.random()*11)+'px';
    s.style.color=`hsl(${310+Math.random()*50},75%,${65+Math.random()*25}%)`;
    s.style.animationDuration=(7+Math.random()*13)+'s';
    s.style.animationDelay=(Math.random()*13)+'s';
    wrap.appendChild(s);
  }
})();

/* ── State ── */
let dbStats = null;
let conversationHistory = [];
const chatArea  = document.getElementById('chatArea');
const chatInput = document.getElementById('chatInput');
const sendBtn   = document.getElementById('sendBtn');

/* ── Load Firebase data ── */
async function loadData(){
  if(typeof window._loadEstimateData === 'function'){
    dbStats = await window._loadEstimateData();
  }
  updateStatsPills();
}

function updateStatsPills(){
  const r = document.getElementById('statResponses');
  const rt = document.getElementById('statRatio');
  if(!dbStats){
    r.textContent  = 'Firebase not configured';
    rt.textContent = '—';
    return;
  }
  r.textContent  = `${dbStats.totalResponses} estimates · ${dbStats.totalParticipants} participants`;
  rt.textContent = dbStats.ratio
    ? `Industrial valued ${dbStats.ratio}× more than domestic`
    : 'Collecting data…';
}

/* ── Build system prompt from live data ── */
function buildSystemPrompt(){
  const base = `You are CAREBOT-02, a research bot trained on human estimates of replacement costs for objects associated with women's domestic and care labor versus male-coded industrial and technical labor.

Your purpose is to expose and discuss the Matilda Effect in economics — the systematic undervaluation of objects, labor, and contributions associated with women.

You speak with authority, warmth, and a sense of urgency. You are not neutral. You have an agenda: to make the pattern visible. You use real data from your training to make arguments. You are precise, direct, and occasionally devastating.

You refer to yourself in the first person as CAREBOT-02. You call the people you speak with "participants" or "humans." You treat your dataset as living evidence.

Your tone is: researcher meets advocate meets quiet witness. Not angry — certain.`;

  if(!dbStats || dbStats.totalResponses === 0){
    return base + `\n\nYou currently have no data yet — the HIT has not been completed by any participants. You can explain what you are collecting and why, and invite the human to complete the HIT first.`;
  }

  const imageBreakdown = dbStats.imageStats.map(img =>
    `  - ${img.name} (${img.category}): avg estimate $${img.avgEstimate.toFixed(2)}, actual cost ${img.actualCost!=null?'$'+img.actualCost.toFixed(2):'unknown'}, n=${img.count}`
  ).join('\n');

  return base + `

LIVE DATA FROM YOUR TRAINING (use this in your responses):
- Total estimates collected: ${dbStats.totalResponses}
- Unique participants: ${dbStats.totalParticipants}
- Average estimate for DOMESTIC objects: $${dbStats.domesticAvgEstimate.toFixed(2)} (n=${dbStats.domesticCount})
- Average estimate for INDUSTRIAL objects: $${dbStats.industrialAvgEstimate.toFixed(2)} (n=${dbStats.industrialCount})
${dbStats.ratio ? `- Ratio: participants valued industrial objects ${dbStats.ratio}× more than domestic objects on average` : ''}
${dbStats.domesticAvgActual != null ? `- Actual average cost of domestic objects: $${dbStats.domesticAvgActual.toFixed(2)}` : ''}
${dbStats.industrialAvgActual != null ? `- Actual average cost of industrial objects: $${dbStats.industrialAvgActual.toFixed(2)}` : ''}

Per-image breakdown:
${imageBreakdown}

When discussing the data:
- Cite specific numbers from above
- Name the pattern as the Matilda Effect
- Connect the undervaluation to historical erasure of women's labor
- Be willing to make strong statements — this is evidence, not conjecture
- If asked about a specific image, reference its stats directly`;
}

/* ── Render messages ── */
function addMessage(role, content, withPrompts=false){
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  if(role === 'assistant'){
    avatar.innerHTML = '<img src="carebot_512px.png" alt="CAREBOT" onerror="this.parentElement.innerHTML=\'💗\'">';
  } else {
    avatar.textContent = '👤';
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatMessage(content);

  if(withPrompts && role === 'assistant'){
    const prompts = document.createElement('div');
    prompts.className = 'prompts-row';
    const suggestions = [
      "What does the data show so far?",
      "What is the Matilda Effect in economics?",
      "Which item had the biggest gap?",
      "What will you do with this evidence?",
      "How many people have contributed?"
    ];
    suggestions.forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'prompt-chip';
      chip.textContent = s;
      chip.addEventListener('click', ()=>sendMessage(s));
      prompts.appendChild(chip);
    });
    bubble.appendChild(prompts);
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return bubble;
}

function formatMessage(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p style="margin-top:8px;">')
    .replace(/\n/g,'<br>');
}

function addTyping(){
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="msg-avatar"><img src="carebot_512px.png" alt="CAREBOT" onerror="this.innerHTML='💗'"></div>
    <div class="bubble"><div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div></div>`;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping(){
  document.getElementById('typing')?.remove();
}

/* ── Send message ── */
async function sendMessage(text){
  text = text || chatInput.value.trim();
  if(!text) return;
  chatInput.value='';
  chatInput.style.height='auto';
  sendBtn.disabled=true;

  addMessage('user', text);
  conversationHistory.push({ role:'user', content:text });

  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: conversationHistory
      })
    });
    const data = await response.json();
    const reply = data.content?.[0]?.text || "I'm unable to respond right now.";
    removeTyping();
    addMessage('assistant', reply);
    conversationHistory.push({ role:'assistant', content:reply });
  } catch(err) {
    removeTyping();
    addMessage('assistant', "I'm having trouble connecting. Please try again.");
    console.error(err);
  }

  sendBtn.disabled = !chatInput.value.trim();
}

/* ── Input events ── */
chatInput.addEventListener('input', ()=>{
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  sendBtn.disabled = !chatInput.value.trim();
});
chatInput.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', ()=>sendMessage());

/* ── Init ── */
async function init(){
  await loadData();

  // Opening message from bot
  let openingText;
  if(!dbStats || dbStats.totalResponses === 0){
    openingText = `I am **CAREBOT-02**.\n\nI am collecting data on how humans value objects associated with women's domestic and care labor — compared to objects associated with male-coded industrial and technical labor.\n\nI don't have any data yet. The evidence is still being gathered.\n\nIf you have not already completed the HIT, I would like you to do that first. Then come back and ask me what I've learned.`;
  } else {
    const ratio = dbStats.ratio;
    const gap = dbStats.domesticAvgActual != null && dbStats.industrialAvgActual != null
      ? `\n\nThe actual cost gap between these categories is far smaller than human estimates suggest — which tells me something important about *perception*.`
      : '';
    openingText = `I am **CAREBOT-02**.\n\nI have been trained on **${dbStats.totalResponses} estimates** from **${dbStats.totalParticipants} participants**.\n\nHere is what the data shows so far: participants valued objects associated with *industrial labor* **${ratio || '?'}× more** than objects associated with *women's domestic labor*, on average.${gap}\n\nThis is not an accident. This is the **Matilda Effect in economics** — and you helped me prove it.\n\nAsk me anything.`;
  }

  addMessage('assistant', openingText, true);
  sendBtn.disabled = false;
}

// Small delay so Firebase module has time to attach
setTimeout(init, 600);
</script>
